<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PrimeMagnus Care Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['"Cormorant Garamond"', 'serif'],
            body: ['Inter', 'sans-serif'],
          },
          colors: {
            evergreen: '#0F3D2E',
            gold: '#C9A24D',
            offwhite: '#F7F6F2',
            charcoal: '#1F2933',
          }
        }
      }
    }
  </script>
</head>

<body class="bg-offwhite font-body text-charcoal min-h-screen flex flex-col">

<main class="flex-grow">

<!-- HERO / CONTACT SECTION -->
<section class="max-w-4xl mx-auto px-6 mt-16">
  <div class="bg-white rounded-2xl shadow-xl p-10">

    <h2 class="text-3xl md:text-4xl font-heading font-semibold text-evergreen text-center mb-6">
      Contact Us
    </h2>

    <div class="w-24 h-px bg-gold mx-auto mb-8"></div>

    <!-- CONTACT FORM -->
    <form id="contactForm" class="space-y-6">

      <!-- Name -->
      <div>
        <label class="block text-sm font-medium mb-1">Name</label>
        <input
          type="text"
          id="name"
          required
          class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-evergreen outline-none"
        />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input
          type="email"
          id="email"
          required
          class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-evergreen outline-none"
        />
      </div>

      <!-- Organisation -->
      <div>
        <label class="block text-sm font-medium mb-1">Organisation</label>
        <input
          type="text"
          id="organisation"
          class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-evergreen outline-none"
        />
      </div>

      <!-- Message -->
      <div>
        <label class="block text-sm font-medium mb-1">Message</label>
        <textarea
          id="message"
          rows="4"
          required
          class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-evergreen outline-none"
        ></textarea>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="w-full bg-evergreen text-white py-3 rounded-xl font-semibold text-lg
               transition-all duration-300 hover:bg-transparent hover:text-evergreen hover:border hover:border-evergreen"
      >
        Send Message
      </button>

      <!-- Status -->
      <p id="status" class="text-center text-sm mt-3"></p>

    </form>
  </div>
</section>

</main>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs@3/dist/email.min.js"></script>

<script>
  // Init EmailJS
  (function () {
    emailjs.init("elzP7DFHwDW60J3zE");
  })();

  // Form submit
  document.getElementById("contactForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const status = document.getElementById("status");
    status.textContent = "Sending...";
    status.className = "text-center text-sm text-gray-500";

    emailjs.send("service_z73pzr7", "template_6y0wkrv", {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      organisation: document.getElementById("organisation").value,
      message: document.getElementById("message").value,
    }).then(
      () => {
        status.textContent = "Message sent successfully!";
        status.className = "text-center text-sm text-green-600";
        document.getElementById("contactForm").reset();
      },
      (error) => {
        status.textContent = "Failed to send message. Please try again.";
        status.className = "text-center text-sm text-red-600";
        console.error(error);
      }
    );
  });
</script>

</body>
</html>
